services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: urbanflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: urbanflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15-alpine
    container_name: urbanflow-postgres
    environment:
      POSTGRES_USER: urbanflow_user
      POSTGRES_PASSWORD: urbanflow_password
      POSTGRES_DB: urbanflow_payments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  neo4j:
    image: neo4j:5.12.0-community
    container_name: urbanflow-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/urbanflow_password
    volumes:
      - neo4j_data:/data

  influxdb:
    image: influxdb:2.7-alpine
    container_name: urbanflow-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=urbanflow_admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=urbanflow_password123
      - DOCKER_INFLUXDB_INIT_ORG=urbanflow_org
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry_bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=urbanflow_super_secret_token_12345
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # -------------------------------------------------------------
  # Microservices Layer
  # -------------------------------------------------------------
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: urbanflow-payment-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=urbanflow_user
      - DB_PASSWORD=urbanflow_password
      - DB_NAME=urbanflow_payments
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - postgres
      - kafka

  routing-service:
    build:
      context: ./services/routing-service
      dockerfile: Dockerfile
    container_name: urbanflow-routing-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=urbanflow_password
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - neo4j
      - kafka

  telemetry-service:
    build:
      context: ./services/telemetry-service
      dockerfile: Dockerfile
    container_name: urbanflow-telemetry-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=urbanflow_super_secret_token_12345
      - INFLUX_ORG=urbanflow_org
      - INFLUX_BUCKET=telemetry_bucket
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - influxdb
      - kafka

  ntcip-adapter:
    build:
      context: ./services/ntcip-adapter
      dockerfile: Dockerfile
    container_name: urbanflow-ntcip-adapter
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka

  prediction-service:
    build:
      context: ./services/prediction-service
      dockerfile: Dockerfile
    container_name: urbanflow-prediction-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: urbanflow-notification-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka

volumes:
  postgres_data:
  neo4j_data:
  influxdb_data:
